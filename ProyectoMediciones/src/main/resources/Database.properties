# Configuración de conexión a MySQL.
# Este archivo contiene valores de ejemplo para evitar credenciales reales en el repositorio.
# En producción, use un Database.properties externo junto al .jar o variables de entorno DB_*.
db.host=localhost
db.port=3306
db.database=mediciones_db
db.user=appuser
db.password=
db.useSSL=false
db.allowPublicKeyRetrieval=true
db.serverTimezone=UTC
db.characterEncoding=UTF-8
